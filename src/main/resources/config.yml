# ======================================================
# FancyTPA - Configuration File
# ======================================================

# ------------------------------------------------------
# General Teleportation Settings
# ------------------------------------------------------
settings:
  # Time in seconds before /tpa or /tpahere occurs
  teleport-delay: 5

  # Time in seconds before /back teleportation occurs
  back-delay: 10

  # Combat Tag duration in seconds (Command block after hitting/getting hit)
  # This works with our internal system, no external plugins needed!
  combat-timer: 15

  # Should the teleportation be cancelled if the player moves or gets hit?
  cancel-on-move: true

# ------------------------------------------------------
# Commands Toggle Section
# Enable or disable specific features of the plugin
# ------------------------------------------------------
commands:
  tpa:
    enabled: true
  tpahere:
    enabled: true
  tpaccept:
    enabled: true
  tpdeny:
    enabled: true
  back:
    enabled: true
  tp-admin: # Admin /tp, /tphere, and /tpall
    enabled: true

# ------------------------------------------------------
# Permissions Configuration
# ------------------------------------------------------
permissions:
  # Admin permissions
  admin-all: "ftpa.admin.*"
  admin-tp: "ftpa.admin.tp"
  admin-tphere: "ftpa.admin.tphere"
  admin-tpall: "ftpa.admin.tpall"

  # Player permissions
  player-all: "ftpa.player.*"
  player-tpa: "ftpa.player.tpa"
  player-tpahere: "ftpa.player.tpahere"
  player-tpaccept: "ftpa.player.tpaccept"
  player-back: "ftpa.player.back"

  # Bypass permission for Combat Tag
  combat-bypass: "fancytpa.bypass.combat"

# ------------------------------------------------------
# Visual and Sound Effects
# ------------------------------------------------------
effects:
  # General toggle for all effects
  enabled: true

  # Enable the spinning circle effect during teleport delay
  circle-enabled: true

  # Sound played upon successful teleportation
  # Use official Spigot names: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
  sound: "ENTITY_ENDERMAN_TELEPORT"

  # Particle type used for general effects
  # Use official Spigot names: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
  particle-type: "PORTAL"
  particle-amount: 50

# ------------------------------------------------------
# Plugin Messages (Supports '&' color codes)
# ------------------------------------------------------
messages:
  prefix: "&b&lFancyTPA &8» "

  # Errors and Restrictions
  no-permission: "&cNo permission! ({perm})"
  command-disabled: "&cThis command is currently disabled."
  player-offline: "&cPlayer is offline or does not exist."
  combat-stop: "&8[&6&l!&8] &cCommand blocked! You are in combat for {time}s."
  teleport-cancelled: "&cTeleportation cancelled! You moved or entered combat."
  world-not-found: "&cWorld &f{world} &cnot found."
  no-back-location: "&cNo previous location found or it has expired."

  # Success Messages
  request-sent: "&7Request sent to &f{player}&7."
  teleport-success: "&aTeleported successfully!"
  teleport-instant: "&aTeleportation was instant (no acceptance required)."
  back-success: "&aReturned to your previous location!"

  # Timer Messages (Used for ActionBars)
  teleporting-actionbar: "&eTeleporting in &6{time}s&e... Do not move!"
  back-actionbar: "&eReturning in &6{time}s&e... Do not move!"

  # Interactive Chat Request
  request-header: "&8&m----------------------------------------"
  request-footer: "&8&m----------------------------------------"
  request-text: " &6» &e{player} &7wants to teleport to you!"
  accept-button: "&a&l[ACCEPT]"
  deny-button: "&c&l[DENY]"
  accept-hover: "&7Click to &aaccept &7teleport request"
  deny-hover: "&7Click to &cdeny &7teleport request"

  # Ignore System Messages (/tpa ignore <player>)
  ignore-added: "&aYou are now ignoring TPA requests from &f{player}&a."
  ignore-removed: "&aYou are no longer ignoring &f{player}&a."
  ignored-by-target: "&cYou cannot send requests to this player."

  # Admin Specific
  admin-tp-success: "&bFancyTPA &8» &7Teleported to &f{target}&7."
  admin-tphere-success: "&bFancyTPA &8» &7Summoned &f{target} &7to your location."
  admin-tpall-success: "&bFancyTPA &8» &7Summoned &f{count} &7players."